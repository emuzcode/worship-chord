<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Central kanji "賛" -->
  <text
    x="600"
    y="335"
    font-family="'Hiragino Sans','Yu Gothic','Noto Sans CJK JP','Noto Sans JP',sans-serif"
    font-size="360"
    font-weight="700"
    fill="#fbbf24"
    text-anchor="middle"
    dominant-baseline="central"
  >賛</text>

  <!-- Top: English title -->
  <text
    x="600"
    y="90"
    font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace"
    font-size="60"
    font-weight="700"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="2"
  >worship-chord</text>

  <!-- Bottom: tagline -->
  <text
    x="600"
    y="590"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="30"
    fill="#ffffff"
    opacity="0.7"
    text-anchor="middle"
  >Japanese hymns shared with the world</text>

  <!-- Sparse chord decorations around the kanji, rotated slightly -->
  <g font-family="ui-monospace,'SFMono-Regular',Menlo,monospace" font-size="48" font-weight="700" fill="#fbbf24" opacity="0.55">
    <text x="200" y="260" transform="rotate(-12 200 260)">[G]</text>
    <text x="1000" y="240" transform="rotate(10 1000 240)">[C]</text>
    <text x="220" y="450" transform="rotate(8 220 450)">[D]</text>
    <text x="980" y="470" transform="rotate(-14 980 470)">[Em]</text>
  </g>

  <!-- Hairline geometric flourishes (subtle) -->
  <g stroke="#ffffff" stroke-width="1" fill="none" opacity="0.18">
    <circle cx="150" cy="150" r="36"/>
    <line x1="186" y1="170" x2="280" y2="220"/>
    <line x1="950" y1="540" x2="1060" y2="520"/>
    <line x1="1050" y1="510" x2="1050" y2="560"/>
  </g>
</svg>
